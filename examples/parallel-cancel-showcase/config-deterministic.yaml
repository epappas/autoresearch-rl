name: parallel-cancel-showcase-deterministic

# Same as config.yaml but with intra_iteration_cancel DISABLED. Used by
# tests/test_showcase_determinism.py to assert that the parallel engine +
# random policy + propose_batch flow is bit-deterministic when cancel
# timing (which depends on filesystem polling jitter) is removed.
#
# The main config.yaml remains the demo that exercises cancellation;
# its decision set is allowed to vary because cancel timing is racy by
# design. See README §Determinism for the full breakdown.

program_path: examples/parallel-cancel-showcase/program.md

objective:
  metric: val_loss
  direction: min

target:
  type: command
  workdir: examples/parallel-cancel-showcase
  timeout_s: 30
  prepare_cmd: ["python3", "prepare.py"]
  train_cmd: ["python3", "train.py"]

policy:
  type: random
  seed: 42
  params:
    learning_rate: [1.0e-5, 1.0e-4, 3.0e-4, 1.0e-3, 3.0e-3, 1.0e-2]
    batch_size: [8, 16, 32, 64]

controller:
  max_iterations: 16
  parallel:
    enabled: true
    max_concurrency: 4
    resources:
      gpu: 4
    submit_poll_interval_s: 0.1
  # intra_iteration_cancel intentionally NOT enabled.

comparability:
  budget_mode: parallel_wallclock
  expected_budget_s: 30
  strict: false

telemetry:
  trace_path: examples/parallel-cancel-showcase/artifacts/traces/events.jsonl
  ledger_path: examples/parallel-cancel-showcase/artifacts/results.tsv
  artifacts_dir: examples/parallel-cancel-showcase/artifacts/runs
  versions_dir: examples/parallel-cancel-showcase/artifacts/versions
  timeline_path: examples/parallel-cancel-showcase/artifacts/traces/timeline.json
