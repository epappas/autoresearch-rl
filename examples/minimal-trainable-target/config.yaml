name: autoresearch-run

objective:
  metric: val_bpb
  direction: min

target:
  type: command
  workdir: examples/minimal-trainable-target
  timeout_s: 3600
  train_cmd:
    - python3
    - train.py
  eval_cmd:
    - python3
    - train.py
  basilica:
    image: python:3.11-slim
    gpu_count: 1
    gpu_models: ["A100", "H100"]
    memory: "8Gi"
    cpu: "4"
    ttl_seconds: 300

policy:
  type: grid
  params:
    learning_rate: [0.0015, 0.0026, 0.0032]
    grad_clip: [0.7, 0.85, 1.0]
    use_qk_norm: [true, false]

controller:
  max_wall_time_s: 60
  no_improve_limit: 6
  failure_rate_limit: 0.8
  failure_window: 5

scoring:
  val_bpb: 1.0
  loss: 0.15
  fail_penalty: 0.8
  timeout_penalty: 1.2
  neutral_penalty: 0.05
  directional_bonus: 0.2
  early_stop_penalty: 0.4
  eval_score_weight: 0.25

telemetry:
  trace_path: traces/events.jsonl
  ledger_path: artifacts/results.tsv
  artifacts_dir: artifacts/runs
  versions_dir: artifacts/versions
  max_file_size_bytes: 52428800  # 50 MB
  max_rotated_files: 5

comparability:
  budget_mode: fixed_wallclock
  expected_budget_s: 60
  expected_hardware_fingerprint: null
  strict: false
