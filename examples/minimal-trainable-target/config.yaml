name: minimal-trainable-target

program_path: examples/minimal-trainable-target/program.md

objective:
  metric: val_bpb
  direction: min

target:
  type: command
  workdir: examples/minimal-trainable-target
  timeout_s: 30
  train_cmd:
    - python3
    - train.py
  eval_cmd:
    - python3
    - train.py
  basilica:
    image: python:3.11-slim
    gpu_count: 1
    gpu_models: ["A100", "H100"]
    memory: "8Gi"
    cpu: "4"
    ttl_seconds: 300

policy:
  type: llm_diff
  mutable_file: examples/minimal-trainable-target/train.py
  frozen_file: examples/minimal-trainable-target/prepare.py
  program_file: examples/minimal-trainable-target/program.md
  llm_api_url: "https://llm.chutes.ai/v1"
  llm_model: "deepseek-ai/DeepSeek-V3-0324"
  llm_api_key_env: "CHUTES_API_KEY"
  llm_timeout_s: 30

controller:
  max_wall_time_s: 300
  no_improve_limit: 5
  failure_rate_limit: 0.8
  failure_window: 5
  checkpoint_path: artifacts/minimal/checkpoint.json

comparability:
  budget_mode: fixed_wallclock
  expected_budget_s: 300
  expected_hardware_fingerprint: null
  strict: false

telemetry:
  trace_path: traces/events.jsonl
  ledger_path: artifacts/results.tsv
  artifacts_dir: artifacts/runs
  versions_dir: artifacts/versions
