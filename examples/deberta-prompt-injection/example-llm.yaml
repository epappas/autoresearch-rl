name: deberta-prompt-injection-llm

objective:
  metric: val_bpb
  direction: min

target:
  type: command
  workdir: examples/deberta-prompt-injection
  timeout_s: 7200
  train_cmd:
    - python3
    - train.py
    - --train-file
    - data/train.jsonl
    - --val-file
    - data/val.jsonl
    - --output-dir
    - /tmp/deberta-llm-out
  eval_cmd:
    - python3
    - train.py
    - --train-file
    - data/train.jsonl
    - --val-file
    - data/val.jsonl
    - --output-dir
    - /tmp/deberta-llm-out

policy:
  type: llm
  params:
    learning_rate: [0.00001, 0.00002, 0.00003]
    epochs: [1, 2, 3]
    weight_decay: [0.0, 0.01, 0.1]
    batch_size: [4, 8]
    grad_clip: [0.5, 1.0]
  llm_api_url: "https://llm.chutes.ai/v1"
  llm_model: "MiniMaxAI/MiniMax-M2.5-TEE"
  llm_api_key_env: "CHUTES_API_KEY"
  llm_timeout_s: 30

controller:
  max_wall_time_s: 7200
  no_improve_limit: 6
  failure_rate_limit: 0.8
  failure_window: 5

comparability:
  budget_mode: fixed_wallclock
  expected_budget_s: 7200
  expected_hardware_fingerprint: null
  strict: false

telemetry:
  trace_path: traces/deberta-llm/events.jsonl
  ledger_path: artifacts/deberta-llm/results.tsv
  artifacts_dir: artifacts/deberta-llm/runs
  versions_dir: artifacts/deberta-llm/versions
