name: deberta-prompt-injection-basilica-llm

objective:
  metric: val_bpb
  direction: min

target:
  type: basilica
  train_cmd:
    - python3
    - /app/train.py
    - --train-file
    - /app/data/train.jsonl
    - --val-file
    - /app/data/val.jsonl
    - --output-dir
    - /tmp/deberta-out
  timeout_s: 900
  basilica:
    image: pytorch/pytorch:2.4.1-cuda12.4-cudnn9-devel
    gpu_count: 1
    gpu_models: ["A100", "H100", "L40S", "RTX-4090", "RTX-A6000"]
    memory: "32Gi"
    cpu: "8"
    storage: null
    ttl_seconds: 900
    setup_cmd: >-
      pip install -q transformers datasets accelerate scikit-learn protobuf
      && mkdir -p /app/data
      && python3 -c "import urllib.request;
      urllib.request.urlretrieve('https://raw.githubusercontent.com/epappas/autoresearch-rl/main/examples/deberta-prompt-injection/train.py', '/app/train.py');
      urllib.request.urlretrieve('https://raw.githubusercontent.com/epappas/autoresearch-rl/main/examples/deberta-prompt-injection/data/train.jsonl', '/app/data/train.jsonl');
      urllib.request.urlretrieve('https://raw.githubusercontent.com/epappas/autoresearch-rl/main/examples/deberta-prompt-injection/data/val.jsonl', '/app/data/val.jsonl')"

policy:
  type: llm
  params:
    learning_rate: [0.00001, 0.00002, 0.00003]
    epochs: [1, 2, 3]
    weight_decay: [0.0, 0.01, 0.1]
    batch_size: [4, 8]
    grad_clip: [0.5, 1.0]
  llm_api_url: "https://llm.chutes.ai/v1"
  llm_model: "MiniMaxAI/MiniMax-M2.5-TEE"
  llm_api_key_env: "CHUTES_API_KEY"
  llm_timeout_s: 30

controller:
  max_wall_time_s: 7200
  no_improve_limit: 6
  failure_rate_limit: 0.8
  failure_window: 6

comparability:
  budget_mode: fixed_wallclock
  expected_budget_s: 900
  strict: false

telemetry:
  trace_path: traces/deberta-basilica-llm/events.jsonl
  ledger_path: artifacts/deberta-basilica-llm/results.tsv
  artifacts_dir: artifacts/deberta-basilica-llm/runs
  versions_dir: artifacts/deberta-basilica-llm/versions
