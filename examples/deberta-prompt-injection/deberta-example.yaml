experiment:
  name: deberta-prompt-injection-example
  target_script: examples/deberta-prompt-injection/train.py
  objective: val_bpb
  mode: minimize
  comparability:
    budget_mode: fixed_wallclock
    expected_budget_s: 1200
    expected_hardware_fingerprint: null
    strict: false

sandbox:
  allow_network: true
  max_memory_gb: 16
  max_cpu_cores: 8
  timeout_s: 1200

controller:
  max_iterations: 8
  history_window: 32

telemetry:
  trace_path: traces/deberta-events.jsonl
  artifacts_dir: artifacts/deberta-runs

benchmark:
  output_path: artifacts/deberta-benchmark/results.json
  sweep:
    learning_rate: [1.0e-5, 2.0e-5, 3.0e-5]
    weight_decay: [0.0, 0.01]
    batch_size: [4]
    epochs: [1]

model:
  name: protectai/deberta-v3-base-prompt-injection-v2
  train_file: examples/deberta-prompt-injection/data/train.jsonl
  val_file: examples/deberta-prompt-injection/data/val.jsonl
